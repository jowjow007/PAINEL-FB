<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Painel Fonseca e Braga</title>
<style>
  :root{
    --ink:#161010;
    --panel:#211918;
    --panel-2:#2a1f1e;
    --paper:#ece6e1;
    --muted:#9c908b;
    --red:#b8362e;
    --red-bright:#c9463c;
    --red-deep:#5c1a16;
    --silver:#a9adb2;
    --line:rgba(236,230,225,0.10);
    --line-strong:rgba(236,230,225,0.18);
    --font-display:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    --font-body:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100%;
    background:var(--ink);
    color:var(--paper);
    font-family:var(--font-body);
    overflow:hidden;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }

  .board{
    display:flex;
    flex-direction:column;
    height:100vh;
    padding:clamp(14px,1.6vw,28px);
    gap:clamp(10px,1.2vw,20px);
  }

  /* ---------- brand mark ---------- */
  .brand-logo{
    height:clamp(46px,4.6vw,72px);
    width:auto;
    display:block;
  }
  .comunicado-mark{
    height:clamp(48px,6vw,84px);
    width:auto;
    filter:drop-shadow(0 2px 10px rgba(0,0,0,0.35));
  }

  /* ---------- top bar ---------- */
  .topbar{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    border-bottom:1px solid var(--line-strong);
    padding-bottom:clamp(10px,1.2vw,18px);
    gap:12px;
  }
  .brand{
    display:flex;
    align-items:center;
    justify-self:start;
  }
  .topbar-title{
    justify-self:center;
    font-family:var(--font-display);
    font-size:clamp(28px,2.6vw,40px);
    letter-spacing:0.35em;
    text-transform:uppercase;
    color:var(--muted);
    white-space:nowrap;
  }
  .topbar-right{
    display:flex;
    align-items:baseline;
    justify-self:end;
    gap:clamp(18px,2.4vw,40px);
  }
  .clock{
    display:flex;
    align-items:baseline;
    gap:1ch;
    font-variant-numeric:tabular-nums;
  }
  .clock .time{
    font-family:var(--font-display);
    font-size:clamp(24px,2.6vw,40px);
    color:var(--paper);
  }
  .clock .date{
    color:var(--muted);
    font-size:clamp(12px,1vw,16px);
    text-transform:capitalize;
  }
  .weather{
    display:flex;
    align-items:center;
    gap:0.8ch;
    color:var(--silver);
    font-variant-numeric:tabular-nums;
  }
  .weather .weather-temp{
    font-family:var(--font-display);
    font-size:clamp(20px,2.2vw,32px);
  }
  .weather .weather-info{
    display:flex;
    flex-direction:column;
    line-height:1.25;
  }
  .weather .weather-city{
    color:var(--paper);
    font-size:clamp(12px,1vw,16px);
    font-weight:600;
  }
  .weather .weather-desc{
    color:var(--muted);
    font-size:clamp(11px,0.9vw,14px);
  }

  /* ---------- main grid ---------- */
  .grid{
    flex:1;
    display:grid;
    grid-template-columns:minmax(0,1.65fr) minmax(0,1fr);
    gap:clamp(10px,1.2vw,20px);
    min-height:0;
  }

  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-top:2px solid var(--red-deep);
    padding:clamp(14px,1.6vw,26px);
    display:flex;
    flex-direction:column;
    min-height:0;
  }

  .panel-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:clamp(10px,1.2vw,18px);
  }
  .eyebrow{
    font-size:clamp(11px,0.85vw,14px);
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--red-bright);
    font-weight:600;
  }
  .panel-sub{
    font-size:clamp(11px,0.8vw,13px);
    color:var(--muted);
  }

  /* ---------- news panel ---------- */
  .news-panel{position:relative;}
  .news-stage{
    position:relative;
    flex:1;
    min-height:0;
  }
  .news-slide{
    position:absolute;
    inset:0;
    overflow:hidden;
    opacity:0;
    transform:translateY(8px);
    transition:opacity 0.6s ease, transform 0.6s ease;
    pointer-events:none;
  }
  .news-slide.active{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
  }
  .news-media{
    position:absolute;
    inset:0;
    background:radial-gradient(circle at 28% 22%, var(--red) 0%, var(--red-deep) 60%, #1c1211 100%);
  }
  .news-media img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .news-scrim{
    position:absolute;
    inset:0;
    background:linear-gradient(to top, rgba(10,7,7,0.94) 0%, rgba(10,7,7,0.68) 38%, rgba(10,7,7,0.1) 68%, transparent 100%);
  }
  .news-text{
    position:relative;
    z-index:1;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    gap:clamp(10px,1.4vw,18px);
    padding:clamp(16px,2vw,32px);
  }
  .news-slide .tag{
    align-self:flex-start;
    font-size:clamp(11px,0.8vw,13px);
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--paper);
    background:rgba(15,10,10,0.55);
    border:1px solid rgba(236,230,225,0.3);
    padding:3px 10px;
  }
  .news-slide h2{
    font-family:var(--font-display);
    font-weight:500;
    font-size:clamp(26px,3.4vw,52px);
    line-height:1.15;
    margin:0;
    color:#fff;
    text-shadow:0 2px 16px rgba(0,0,0,0.55);
    text-wrap:balance;
  }
  .news-slide .meta{
    color:rgba(236,230,225,0.8);
    font-size:clamp(12px,1vw,16px);
  }
  .news-slide .lede{
    margin:0;
    max-width:64ch;
    color:rgba(236,230,225,0.88);
    font-size:clamp(13px,1.05vw,17px);
    line-height:1.4;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .dots{
    display:flex;
    gap:8px;
    margin-top:clamp(10px,1.2vw,16px);
  }
  .dots span{
    width:7px;height:7px;border-radius:50%;
    background:var(--line-strong);
  }
  .dots span.active{background:var(--red-bright);}

  /* ---------- side column ---------- */
  .side{
    display:flex;
    flex-direction:column;
    gap:clamp(10px,1.2vw,20px);
    min-height:0;
  }
  .side .panel{flex:1;}

  .agenda-panel{ position:relative; }
  .agenda-stage{
    flex:1;
    min-height:0;
    position:relative;
    overflow:hidden;
  }
  .agenda-page{
    position:absolute;
    inset:0;
    list-style:none;
    margin:0;
    padding:0;
    display:flex;
    flex-direction:column;
    gap:clamp(10px,1.1vw,16px);
    opacity:0;
    transform:translateY(8px);
    transition:opacity 0.6s ease, transform 0.6s ease;
    pointer-events:none;
  }
  .agenda-page.active{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
  }
  .agenda-page li{
    display:flex;
    flex-direction:column;
    gap:3px;
    border-bottom:1px solid var(--line);
    padding-bottom:clamp(8px,1vw,14px);
  }
  .agenda-page li:last-child{ border-bottom:none; }
  .agenda-page li.audiencia{
    background:rgba(250,204,21,0.12);
    padding:6px 10px clamp(8px,1vw,14px) 10px;
    margin:-6px 0 0 0;
    border-radius:3px;
  }
  .agenda-item-head{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    row-gap:4px;
    gap:clamp(6px,0.7vw,12px);
  }
  .a-date{
    font-family:var(--font-display);
    color:var(--red-bright);
    font-variant-numeric:tabular-nums;
    font-size:clamp(15px,1.2vw,20px);
    white-space:nowrap;
  }
  .a-date.fatal{ color:#ff6a5c; }
  .a-hora{
    color:var(--muted);
    font-size:clamp(11px,0.85vw,14px);
    font-variant-numeric:tabular-nums;
    white-space:nowrap;
  }
  .a-tipo{
    font-size:clamp(10px,0.75vw,12px);
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--silver);
    border:1px solid rgba(169,173,178,0.4);
    padding:1px 7px;
    white-space:nowrap;
  }
  .a-tipo.fatal{
    color:#ff8177;
    border-color:rgba(255,129,119,0.5);
  }
  .a-tipo.audiencia{
    color:#1a1400;
    background:#f0b90b;
    border-color:#f0b90b;
    font-weight:700;
  }
  .a-titulo{
    font-size:clamp(14px,1.1vw,18px);
    font-weight:600;
    color:var(--paper);
    line-height:1.3;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .a-processo{
    color:var(--muted);
    font-size:clamp(12px,0.9vw,15px);
    line-height:1.35;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .a-resp{
    font-size:clamp(11px,0.8vw,13px);
    font-weight:700;
    color:var(--silver);
  }
  .a-resp::before{
    content:"Responsável ";
    font-weight:400;
    text-transform:uppercase;
    letter-spacing:0.05em;
    font-size:0.85em;
    color:var(--muted);
  }
  .etq{
    font-size:clamp(9px,0.68vw,11px);
    letter-spacing:0.05em;
    text-transform:uppercase;
    font-weight:700;
    padding:1px 6px;
    color:#fff;
    white-space:nowrap;
  }
  .etq-fatal{ background:#b8362e; }
  .etq-interno{ background:#2f8f5b; }
  .etq-condominio{ background:#1f3d73; }
  .etq-outro{ background:rgba(169,173,178,0.3); color:var(--paper); }

  .empty-hint{
    color:var(--muted);
    font-size:clamp(12px,0.95vw,15px);
    font-style:italic;
  }

  /* ---------- status bar ---------- */
  .statusbar{
    display:flex;
    align-items:center;
    gap:clamp(10px,1.2vw,18px);
    color:var(--muted);
    font-size:clamp(10px,0.8vw,13px);
    letter-spacing:0.04em;
  }
  .statusbar-dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--red-bright);
    box-shadow:0 0 0 0 rgba(201,70,60,0.6);
    animation:pulse 2.4s ease-in-out infinite;
    flex:none;
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(201,70,60,0.5);}
    50%{box-shadow:0 0 0 5px rgba(201,70,60,0);}
  }
  #lastUpdated{ flex:none; white-space:nowrap; }
  .ticker{
    flex:1;
    min-width:0;
    display:flex;
    align-items:center;
    gap:clamp(8px,1vw,14px);
  }
  .ticker-label{
    flex:none;
    font-size:clamp(9px,0.72vw,11px);
    letter-spacing:0.08em;
    text-transform:uppercase;
    font-weight:700;
    color:#fff;
    background:var(--red);
    padding:2px 8px;
  }
  .ticker-viewport{
    flex:1;
    min-width:0;
    overflow:hidden;
    display:flex;
    align-items:center;
    padding:3px 0;
  }
  .ticker-track{
    display:flex;
    align-items:center;
    white-space:nowrap;
    width:max-content;
  }
  .ticker-copy{
    padding-right:60px;
    color:var(--paper);
    font-variant-numeric:tabular-nums;
  }
  @keyframes tickerRTL{
    from{ transform:translateX(0%); }
    to{ transform:translateX(-50%); }
  }
  .ticker-name{
    display:inline-block;
    font-weight:400;
    text-transform:uppercase;
    letter-spacing:0.03em;
    color:#fff;
    background:rgba(201,70,60,0.2);
    border:1px solid rgba(201,70,60,0.45);
    padding:2px 10px;
    border-radius:2px;
  }
  .ticker-name b{ font-weight:700; }

  /* ---------- comunicado em tela cheia ---------- */
  .comunicado-overlay{
    position:fixed;
    inset:0;
    z-index:50;
    display:flex;
    align-items:center;
    justify-content:center;
    background:radial-gradient(circle at 50% 38%, var(--red-bright) 0%, var(--red) 45%, var(--red-deep) 78%, #200b09 100%);
    opacity:0;
    pointer-events:none;
    transition:opacity 0.7s ease;
  }
  .comunicado-overlay.show{
    opacity:1;
    pointer-events:auto;
  }
  .comunicado-overlay::before{
    content:"";
    position:absolute;
    inset:34px;
    border:1px solid rgba(255,255,255,0.22);
  }
  .comunicado-card{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:clamp(14px,1.8vw,26px);
    max-width:min(70vw,900px);
    transform:scale(0.97);
    transition:transform 0.7s ease;
  }
  .comunicado-overlay.show .comunicado-card{ transform:scale(1); }
  .comunicado-eyebrow{
    font-size:clamp(12px,1vw,15px);
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:rgba(255,255,255,0.75);
  }
  .comunicado-title{
    font-family:var(--font-display);
    font-weight:500;
    font-size:clamp(30px,4.4vw,64px);
    line-height:1.15;
    margin:0;
    color:#fff;
    text-wrap:balance;
  }
  .comunicado-body{
    font-size:clamp(15px,1.5vw,24px);
    color:rgba(255,255,255,0.88);
    line-height:1.5;
    margin:0;
    max-width:56ch;
  }
  .comunicado-photo{
    display:none;
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;
    background:var(--ink);
  }
  .comunicado-weather{
    display:none;
    position:absolute;
    inset:0;
    overflow:hidden;
    background:linear-gradient(135deg, var(--panel-2) 0%, var(--ink) 70%);
    flex-direction:column;
    padding:clamp(40px,5vh,72px) clamp(48px,6vw,96px);
    gap:clamp(24px,3.5vh,44px);
  }
  .cw-glow{
    position:absolute;
    top:-12%;
    right:-6%;
    width:46%;
    aspect-ratio:1;
    border-radius:50%;
    filter:blur(50px);
    opacity:0.6;
    pointer-events:none;
  }
  .cw-hills{
    position:absolute;
    left:0;
    bottom:0;
    width:100%;
    height:24%;
    pointer-events:none;
  }
  .cw-scrim{
    position:absolute;
    inset:0;
    background:linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.05) 35%, rgba(0,0,0,0.3) 100%);
    pointer-events:none;
  }
  .cw-head, .cw-body{
    position:relative;
    z-index:1;
  }
  .cw-head{
    display:flex;
    align-items:baseline;
    gap:clamp(14px,1.6vw,24px);
  }
  .cw-city{
    font-family:var(--font-display);
    font-size:clamp(24px,2.6vw,40px);
    color:#fff;
    text-shadow:0 2px 10px rgba(0,0,0,0.4);
    letter-spacing:0.02em;
  }
  .cw-date{
    font-size:clamp(14px,1.2vw,18px);
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:rgba(255,255,255,0.75);
    text-shadow:0 1px 6px rgba(0,0,0,0.35);
  }
  .cw-body{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:clamp(24px,3.4vh,44px);
  }
  .cw-now{
    display:flex;
    align-items:center;
    align-self:flex-start;
    gap:clamp(20px,2.6vw,40px);
    background:rgba(255,255,255,0.16);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.28);
    border-radius:28px;
    padding:clamp(22px,2.8vh,36px) clamp(32px,4vw,56px);
  }
  .cw-now-icon{
    width:clamp(90px,11vw,160px);
    height:clamp(90px,11vw,160px);
    flex:none;
    filter:drop-shadow(0 4px 14px rgba(0,0,0,0.35));
    animation:cwFloat 4s ease-in-out infinite;
  }
  .cw-now-main{
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .cw-now-temp{
    font-family:var(--font-display);
    font-size:clamp(64px,9vw,140px);
    line-height:1;
    color:#fff;
    text-shadow:0 3px 14px rgba(0,0,0,0.4);
  }
  .cw-now-desc{
    font-size:clamp(16px,1.5vw,24px);
    color:rgba(255,255,255,0.9);
    text-shadow:0 2px 8px rgba(0,0,0,0.35);
    text-transform:capitalize;
  }
  .cw-now-range{
    font-size:clamp(14px,1.2vw,18px);
    color:rgba(255,255,255,0.8);
    text-shadow:0 1px 6px rgba(0,0,0,0.35);
    font-variant-numeric:tabular-nums;
  }
  .cw-forecast{
    display:flex;
    flex-direction:row;
    gap:clamp(10px,1.3vw,18px);
  }
  .cw-day{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:clamp(6px,0.8vh,10px);
    background:rgba(255,255,255,0.14);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.22);
    border-radius:18px;
    padding:clamp(16px,2vh,26px) clamp(6px,1vw,12px);
  }
  .cw-day-icon{
    width:clamp(32px,3vw,46px);
    height:clamp(32px,3vw,46px);
    flex:none;
    filter:drop-shadow(0 2px 6px rgba(0,0,0,0.3));
  }
  .cw-day-name{
    font-size:clamp(13px,1.05vw,17px);
    font-weight:600;
    color:#fff;
    text-shadow:0 1px 6px rgba(0,0,0,0.35);
    text-transform:capitalize;
  }
  .cw-day-range{
    font-size:clamp(13px,1.05vw,17px);
    font-variant-numeric:tabular-nums;
    color:rgba(255,255,255,0.78);
    text-shadow:0 1px 6px rgba(0,0,0,0.35);
  }
  .cw-day-range strong{ color:#fff; font-weight:600; }
  @keyframes cwFloat{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-6px); }
  }
  .comunicado-progress{
    position:absolute;
    bottom:clamp(30px,4vh,56px);
    left:50%;
    transform:translateX(-50%);
    width:220px;
    height:2px;
    background:rgba(255,255,255,0.22);
    overflow:hidden;
  }
  .comunicado-progress span{
    display:block;
    height:100%;
    width:100%;
    background:#fff;
    transform-origin:left;
    transform:scaleX(0);
  }
  .comunicado-progress span.run{
    animation:countdown-bar linear forwards;
    animation-duration:var(--dur, 30s);
  }
  @keyframes countdown-bar{
    from{ transform:scaleX(1); }
    to{ transform:scaleX(0); }
  }
</style>
</head>
<body>

<div class="board">

function withTimeout(promise, ms){
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error("timeout")), ms))
  ]);
}

function parseCsv(text){
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(field); field = ""; }
      else if(c === '\n'){ row.push(field); rows.push(row); row = []; field = ""; }
      else if(c === '\r'){ /* skip */ }
      else field += c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  if(!rows.length) return [];
  const header = rows[0].map(h => h.trim().toLowerCase());
  return rows.slice(1).filter(r => r.some(c => c.trim() !== "")).map(r => {
    const obj = {};
    header.forEach((h, idx) => obj[h] = (r[idx] || "").trim());
    return obj;
  });
}

  if(code === 1 || code === 2) return "partly";
  if(code === 3) return "cloud";
  if(code === 45 || code === 48) return "fog";
  if([51, 53, 55].includes(code)) return "drizzle";
  if([61, 63, 65, 80, 81, 82].includes(code)) return "rain";
  if([71, 73, 75].includes(code)) return "snow";
  if([95, 96, 99].includes(code)) return "storm";
  return "cloud";
}

function rotateNews(){
  const slides = document.querySelectorAll(".news-slide");
  const dots = document.querySelectorAll(".dots span");
  if(!slides.length) return;
  slides[newsIndex].classList.remove("active");
  dots[newsIndex].classList.remove("active");
  newsIndex = (newsIndex + 1) % slides.length;
  slides[newsIndex].classList.add("active");
  dots[newsIndex].classList.add("active");
}

function stripHtml(html){
  return (html || "")
    .replace(/<[^>]*>/g, " ")
    .replace(/&nbsp;/g, " ")
    .replace(/&amp;/g, "&")
    .replace(/&quot;/g, "\"")
    .replace(/&#8211;/g, "–")
    .replace(/&#8217;/g, "’")
    .replace(/\s+/g, " ")
    .trim();
}

function extractImageFromHtml(html){
  const m = (html || "").match(/<img[^>]+src=["']([^"']+)["']/i);
  return m ? m[1] : "";
}

const NEWS_CACHE_KEY = "painelfb_news_meta_cache_v1";
const NEWS_CACHE_TTL_MS = 24 * 60 * 60 * 1000;

function loadNewsCache(){
  try{
    const raw = localStorage.getItem(NEWS_CACHE_KEY);
    if(!raw) return {};
    const obj = JSON.parse(raw);
    const now = Date.now();
    const fresh = {};
    for(const k in obj){ if(obj[k] && (now - obj[k].ts) < NEWS_CACHE_TTL_MS) fresh[k] = obj[k]; }
    return fresh;
  } catch(e){ return {}; }
}

function saveNewsCache(cache){
  try{ localStorage.setItem(NEWS_CACHE_KEY, JSON.stringify(cache)); } catch(e){ /* localStorage indisponível */ }
}

async function fetchArticleMeta(url){
  const res = await withTimeout(fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`), 7000);
  if(!res.ok) throw new Error("microlink http error");
  const data = await res.json();
  if(data.status !== "success") throw new Error("microlink status error");
  return {
    image: (data.data.image && data.data.image.url) || "",
    lede: data.data.description || "",
  };
}

function applyNewsEnrichment(index, patch){
  const slides = document.querySelectorAll(".news-slide");
  const slide = slides[index];
  if(!slide) return;
  if(patch.image){
    const media = slide.querySelector(".news-media");
    if(media && !media.querySelector("img")){
      const img = document.createElement("img");
      img.src = patch.image;
      img.alt = "";
      img.onerror = () => img.remove();
      media.appendChild(img);
    }
  }
  if(patch.lede){
    const text = slide.querySelector(".news-text");
    const h2 = text && text.querySelector("h2");
    if(text && h2 && !text.querySelector(".lede")){
      const p = document.createElement("p");
      p.className = "lede";
      p.textContent = patch.lede;
      h2.insertAdjacentElement("afterend", p);
    }
  }
}

async function enrichNewsImages(){
  const cache = loadNewsCache();
  let changed = false;
  await Promise.all(newsItems.map(async (item, index) => {
    if(item.image || !item.link) return;
    let meta = cache[item.link];
    if(!meta){
      try{
        meta = await fetchArticleMeta(item.link);
        cache[item.link] = { ...meta, ts: Date.now() };
        changed = true;
      } catch(e){
        return;
      }
    }
    const patch = {};
    if(meta.image){ item.image = meta.image; patch.image = meta.image; }
    if(meta.lede && !item.lede){ item.lede = meta.lede; patch.lede = meta.lede; }
    applyNewsEnrichment(index, patch);
  }));
  if(changed) saveNewsCache(cache);
}

async function loadNews(){
  const sourceLabel = document.getElementById("newsSource");
  sourceLabel.textContent = "";
  try{
    const perFeed = await Promise.all(CONFIG.newsRssUrls.map(async (url) => {
      try{
        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`;
        const res = await withTimeout(fetch(apiUrl), 6000);
        if(!res.ok) throw new Error("rss http error");
        const data = await res.json();
        if(data.status !== "ok" || !data.items || !data.items.length) throw new Error("rss empty");
        const feedTitle = (data.feed && data.feed.title) || "notícia";
        return data.items.slice(0, 6).map(it => {
          const rawDesc = it.description || it.content || "";
          const lede = stripHtml(rawDesc);
          const ledeUsable = lede && lede.length > 12 && lede.toLowerCase() !== (it.title || "").toLowerCase();
          return {
            title: it.title,
            tag: feedTitle,
            source: new Date(it.pubDate).toLocaleDateString("pt-BR"),
            link: it.link,
            image: it.thumbnail || (it.enclosure && it.enclosure.link) || extractImageFromHtml(rawDesc) || "",
            lede: ledeUsable ? lede.slice(0, 180) : "",
            pubDate: it.pubDate,
          };
        });
      } catch(e){
        return [];
      }
    }));
    const merged = perFeed.flat().sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
    if(!merged.length) throw new Error("todas as fontes de notícias falharam");
    newsItems = merged.slice(0, 12);
  } catch(e){
    newsItems = SAMPLE_NEWS;
  }
  renderNewsSlides();
  enrichNewsImages();
  if(newsRotateTimer) clearInterval(newsRotateTimer);
  newsRotateTimer = setInterval(rotateNews, CONFIG.newsRotateSeconds * 1000);
}

function parseDateBR(d){
  const m = (d || "").match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if(!m) return Infinity;
  return new Date(+m[3], +m[2] - 1, +m[1]).getTime();
}

function agendaGroup(item){
  if(/audi/i.test(item.tipo || "")) return 0;
  const hasFatal = item.badges.some(b => b.cls === "etq-fatal");
  const hasInterno = item.badges.some(b => b.cls === "etq-interno");
  const hasCondominio = item.badges.some(b => b.cls === "etq-condominio");
  if(hasFatal && !hasInterno) return 1;
  if(hasFatal && hasInterno) return 2;
  if(hasInterno) return 3;
  if(hasCondominio) return 4;
  return 5;
}

function etiquetaBadges(str){
  return (str || "")
    .split(",")
    .map(s => s.trim())
    .filter(Boolean)
    .map(label => {
      let cls = "etq-outro";
      if(/fatal/i.test(label)) cls = "etq-fatal";
      else if(/interno/i.test(label)) cls = "etq-interno";
      else if(/condom/i.test(label)) cls = "etq-condominio";
      return { label, cls };
    });
}

          .map(r => ({
            date: r["data"] || r["agenda data"] || "",
            hora: r["hora"] || "",
            tipo: r["tipo"] || "",
            titulo: r["título"] || r["titulo"] || "",
            processo: r["título do processo/caso/atendimento"] || r["titulo do processo/caso/atendimento"] || "",
            responsavel: r["responsável"] || r["responsavel"] || "",
            fatal: /fatal/i.test(r["etiquetas"] || ""),
            badges: etiquetaBadges(r["etiquetas"] || ""),
          }))
          .sort((a, b) => {
            const ga = agendaGroup(a), gb = agendaGroup(b);
            if(ga !== gb) return ga - gb;
            return parseDateBR(a.date) - parseDateBR(b.date);
          });
      }
    } catch(e){ /* mantém SAMPLE_AGENDA */ }
  }
  agendaItems = items;
  renderAgendaPages();

function getNextDaysRange(date, days){
  const start = new Date(date);
  start.setHours(0, 0, 0, 0);
  const end = new Date(start);
  end.setDate(start.getDate() + days - 1);
  end.setHours(23, 59, 59, 999);
  return { start: start.getTime(), end: end.getTime() };
}

function updateAgendaWeekCount(){
  const { start, end } = getNextDaysRange(new Date(), 7);
  const count = agendaItems.filter(a => {
    if(/audi/i.test(a.tipo || "")) return false;
    const t = parseDateBR(a.date);
    return t >= start && t <= end;
  }).length;
  const label = document.getElementById("agendaWeekCount");
  label.textContent = count === 1 ? "1 Prazo Para os Próximos 7 Dias" : `${count} Prazos Para os Próximos 7 Dias`;
}

function updatePrazosTicker(){
  const track = document.getElementById("tickerTrack");
  const counts = {};
  agendaItems.forEach(a => {
    if(/audi/i.test(a.tipo || "")) return;
    const name = (a.responsavel || "").trim();
    if(!name) return;
    counts[name] = (counts[name] || 0) + 1;
  });
  const entries = Object.entries(counts).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));

  if(!entries.length){
    track.style.animation = "none";
    track.innerHTML = "";
    return;
  }

  const text = entries
    .map(([name, count]) => `<span class="ticker-name"><b>${name}</b> — ${count} ${count === 1 ? "prazo" : "prazos"}</span>`)
    .join("     •     ");

  track.innerHTML = `<span class="ticker-copy">${text}</span><span class="ticker-copy">${text}</span>`;

  track.style.animation = "none";
  void track.offsetWidth; // força recálculo antes de reiniciar a animação
  const halfWidth = track.scrollWidth / 2;
  const speedPxPerSec = 60;
  const duration = Math.max(15, halfWidth / speedPxPerSec);
  track.style.animation = `tickerRTL ${duration}s linear infinite`;
}

function renderAgendaPages(){
  const stage = document.getElementById("agendaStage");
  const dots = document.getElementById("agendaDots");
  stage.innerHTML = "";
  dots.innerHTML = "";
  updateAgendaWeekCount();
  updatePrazosTicker();

  if(agendaRotateTimer){ clearInterval(agendaRotateTimer); agendaRotateTimer = null; }

  if(!agendaItems.length){
    stage.innerHTML = `<div class="empty-hint">Nenhum compromisso cadastrado.</div>`;
    return;
  }

  const pageSize = CONFIG.agendaPageSize;
  const pages = [];
  for(let i = 0; i < agendaItems.length; i += pageSize){
    pages.push(agendaItems.slice(i, i + pageSize));
  }

  pages.forEach((page, i) => {
    const ul = document.createElement("ul");
    ul.className = "agenda-page" + (i === 0 ? " active" : "");
    ul.innerHTML = page.map(a => `
      <li class="${/audi/i.test(a.tipo || "") ? "audiencia" : ""}">
        <div class="agenda-item-head">
          <span class="a-date${a.fatal ? " fatal" : ""}">${a.date ? a.date.slice(0, 5) : ""}</span>
          <span class="a-hora">${a.hora && a.hora !== "-" ? a.hora : ""}</span>
          ${(a.badges || []).map(b => `<span class="etq ${b.cls}">${b.label}</span>`).join("")}
          <span class="a-tipo${a.fatal ? " fatal" : ""}${/audi/i.test(a.tipo || "") ? " audiencia" : ""}">${a.tipo || "Prazo"}</span>
        </div>
        <span class="a-titulo">${a.titulo}</span>
        ${a.processo ? `<span class="a-processo">${a.processo}</span>` : ""}
        ${a.responsavel ? `<span class="a-resp">${a.responsavel}</span>` : ""}
      </li>
    `).join("");
    stage.appendChild(ul);

    const dot = document.createElement("span");
    if(i === 0) dot.className = "active";
    dots.appendChild(dot);
  });

  agendaPageIndex = 0;
  if(pages.length > 1){
    agendaRotateTimer = setInterval(rotateAgendaPage, CONFIG.agendaRotateSeconds * 1000);
  }
}

function rotateAgendaPage(){
  const pageEls = document.querySelectorAll(".agenda-page");
  const dotEls = document.querySelectorAll("#agendaDots span");
  if(!pageEls.length) return;
  pageEls[agendaPageIndex].classList.remove("active");
  dotEls[agendaPageIndex].classList.remove("active");
  agendaPageIndex = (agendaPageIndex + 1) % pageEls.length;
  pageEls[agendaPageIndex].classList.add("active");
  dotEls[agendaPageIndex].classList.add("active");
}

/* ---------------- comunicados em imagem (pasta do GitHub) ---------------- */
let comunicadoImages = [];

async function loadComunicadoImages(){
  try{
    const res = await withTimeout(fetch(CONFIG.comunicadoImagesApiUrl), 8000);
    if(!res.ok) throw new Error("github api error");
    const data = await res.json();
    if(!Array.isArray(data)) throw new Error("resposta inesperada");
    comunicadoImages = data
      .filter(f => f.type === "file" && /\.(jpe?g|png|gif|webp)$/i.test(f.name))
      .sort((a, b) => a.name.localeCompare(b.name))
      .map(f => f.download_url);
  } catch(e){
    comunicadoImages = [];
  }
}

/* ---------------- comunicado em tela cheia ---------------- */
let comunicadoIndex = 0;
let comunicadoQueue = [];

function rebuildComunicadoQueue(){
  const textItems = noticesData
    .filter(n => n.title || n.body)
    .map(n => ({ type: "text", title: n.title, body: n.body }));
  const imageItems = comunicadoImages.map(url => ({ type: "image", url }));
  const weatherItems = forecastData ? [{ type: "weather" }] : [];
  comunicadoQueue = [...imageItems, ...weatherItems, ...textItems];
}

function fillWeatherComunicado(){
  const theme = weatherTheme(forecastData.current.code, forecastData.current.isDay);
  const panel = document.getElementById("comunicadoWeather");
  panel.style.background = `linear-gradient(160deg, ${theme.bg[0]} 0%, ${theme.bg[1]} 100%)`;
  document.getElementById("cwGlow").style.background =
    `radial-gradient(circle, ${theme.glow} 0%, transparent 70%)`;

  document.getElementById("cwCity").textContent = CONFIG.cityLabel;
  document.getElementById("cwDate").textContent =
    new Date().toLocaleDateString("pt-BR", { weekday: "long", day: "2-digit", month: "long" });

  document.getElementById("cwNowIcon").innerHTML = weatherIconSVG(forecastData.current.code, forecastData.current.isDay);
  document.getElementById("cwNowTemp").textContent = `${forecastData.current.temp}°`;
  document.getElementById("cwNowDesc").textContent = WEATHER_CODES[forecastData.current.code] || "—";
  document.getElementById("cwNowRange").textContent =
    `Máx. ${forecastData.today.max}° · Mín. ${forecastData.today.min}°`;

  document.getElementById("cwForecast").innerHTML = forecastData.days.map(d => {
    const dayName = new Date(d.date + "T12:00:00").toLocaleDateString("pt-BR", { weekday: "short" });
    return `
      <div class="cw-day">
        <div class="cw-day-icon">${weatherIconSVG(d.code)}</div>
        <span class="cw-day-name">${dayName}</span>
        <span class="cw-day-range"><strong>${d.max}°</strong> / ${d.min}°</span>
      </div>
    `;
  }).join("");
}

function showComunicado(){
  if(!comunicadoQueue.length) return;
  const item = comunicadoQueue[comunicadoIndex % comunicadoQueue.length];
  comunicadoIndex++;

  const overlay = document.getElementById("comunicadoOverlay");
  const card = document.getElementById("comunicadoCard");
  const photo = document.getElementById("comunicadoPhoto");
  const weather = document.getElementById("comunicadoWeather");

  card.style.display = "none";
  photo.style.display = "none";
  weather.style.display = "none";

  if(item.type === "image"){
    photo.style.display = "block";
    photo.src = item.url;
  } else if(item.type === "weather"){
    weather.style.display = "flex";
    fillWeatherComunicado();
  } else {
    card.style.display = "flex";
    document.getElementById("comunicadoTitle").textContent = item.title;
    document.getElementById("comunicadoBody").textContent = item.body;
  }

  const bar = document.getElementById("comunicadoBar");
  bar.style.setProperty("--dur", CONFIG.comunicadoDurationSeconds + "s");
  bar.classList.remove("run");
  void bar.offsetWidth; // reinicia a animação
  bar.classList.add("run");

  overlay.classList.add("show");
  overlay.setAttribute("aria-hidden", "false");

  setTimeout(() => {
    overlay.classList.remove("show");
    overlay.setAttribute("aria-hidden", "true");
  }, CONFIG.comunicadoDurationSeconds * 1000);
}

function scheduleComunicados(){
  setInterval(showComunicado, CONFIG.comunicadoIntervalMinutes * 60 * 1000);
}

/* ---------------- orquestração ---------------- */
async function refreshAll(){
  await Promise.all([loadWeather(), loadNews(), loadNotices(), loadAgenda(), loadComunicadoImages()]);
  rebuildComunicadoQueue();
  document.getElementById("lastUpdated").textContent =
    "atualizado às " + new Date().toLocaleTimeString("pt-BR", { hour:"2-digit", minute:"2-digit" });
}

refreshAll();
setInterval(refreshAll, CONFIG.refreshMinutes * 60 * 1000);
scheduleComunicados();
setTimeout(() => location.reload(), CONFIG.reloadEveryHours * 60 * 60 * 1000);
</script>
